schema_version: "game_writer_demo_v0_5"
project:
  id: "missing_phone"
  title: "失踪者的手机"
  theme_question: "当真相会伤害无辜者时，你是否仍然有义务公开它？"
  interface: "竖屏手机"
start_scene_id: "ch01_phone_lock"
initial_state:
  clues.unsent_warning: false
  clues.station_location: false
  clues.chen_trimmed_location: false
  clues.wipe_pause_window: false
  clues.lock_time_0213: false
  clues.cloud_admin: false
  clues.freeze_token: false
  clues.screen_recording: false
  clues.chen_alias: false
  clues.chen_casefile: false
  clues.station_route_confirmed: false
  clues.voice_note: false
  clues.station_entry_code: false
  clues.security_booth: false
  clues.camera_blind_spot: false
  clues.ticket_warning: false
  clues.locker_a17: false
  clues.hidden_camera: false
  clues.backup_copy: false
  clues.lin_audio_key: false
  clues.victim_list: false
  clues.lin_confession: false
  clues.raw_recording: false
  clues.edited_recording: false
  clues.final_message: false
  clues.chen_motive: false
  clues.public_packet_ready: false
  clues.archive_ready: false
  clues.chen_message_ready: false
  stance.truth_first: 0
  stance.protect_person: 0
  relationships.chen.trust: 0
  relationships.chen.suspicion: 0
  relationships.lin.bond: 0
  pressure.company_alert: 0
scenes:
  - id: "ch01_phone_lock"
    chapter: "第一章：锁屏上的半句话"
    title: "锁屏上的半句话"
    task: "在远程清除前确认林最后联系的人。"
    pressure: "远程清除 06:00"
    required_for_demo: true
    state_echoes:

    background_blocks:
      - id: "bg_ch01_phone_lock"
        text: "手机亮起。未发送短信停在输入框里：“如果我没回来，不要相信陈...” 顶部通知显示：远程清除已排队。锁屏时间停在 02:13。"
        observe_anchors:
          - id: "obs_unsent_sms"
            text_range: "未发送短信"
            label: "查看短信草稿"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.unsent_warning: true
            unlocks_choices:

            opens_fragment:
              id: "frag_unsent_sms"
              title: "查看短信草稿"
              body: "草稿创建于 02:13，最后一次编辑停在“陈”字后。输入法候选里，第一个词是“陈警官”，第二个词是“陈述”。"
              evidence_tags:
                - "warning"
                - "chen"
              nested_anchors:
                - id: "obs_0213_log"
                  text_range: "02:13"
                  label: "对照系统日志"
                  discoverability: "subtle"
                  depth: 2
                  effects:
                    - set:
                        clues.station_location: true
                  unlocks_choices:
                    - "choice_go_station"
                  opens_fragment:
                    id: "frag_0213_log"
                    title: "对照系统日志"
                    body: "02:13 时手机短暂开启定位，地点是城北废弃地铁站。4 秒后，定位记录被手动截断。"
                    evidence_tags:
                      - "location"
                      - "station"
                    nested_anchors:
                      - id: "obs_trimmed_gap"
                        text_range: "手动截断"
                        label: "检查截断痕迹"
                        discoverability: "subtle"
                        depth: 3
                        effects:
                          - set:
                              clues.chen_trimmed_location: true
                        unlocks_choices:
                          - "choice_confront_chen"
                        opens_fragment:
                          id: "frag_trimmed_gap"
                          title: "检查截断痕迹"
                          body: "截断命令来自一个备注为“陈”的联系人号码。这不是系统自动清理。"
                          evidence_tags:
                            - "chen"
                            - "tamper"
                          nested_anchors:
                  unlock_guidance:
                    id: "guide_choice_from_observe"
                    title: "行动栏刷新"
                    text: "底部行动栏多出了一条去向。不是所有行动都会一开始出现，有些必须先被证据照亮。"
            guidance:
              id: "guide_first_observe"
              title: "锁屏记录展开"
              text: "你按下这段停在屏幕上的文字，记录向下展开。被标出的异常词，往往不止一层。"
          - id: "obs_remote_wipe"
            text_range: "远程清除"
            label: "查看远程清除来源"
            discoverability: "obvious"
            depth: 1
            effects:
              - add:
                  pressure.company_alert: 1
            unlocks_choices:

            opens_fragment:
              id: "frag_remote_wipe"
              title: "查看远程清除来源"
              body: "清除请求不是来自普通云服务，而是来自林调查过的公司设备管理后台。队列里有一个临时的暂停窗口。"
              evidence_tags:
                - "pressure"
                - "company"
              nested_anchors:
                - id: "obs_pause_window"
                  text_range: "暂停窗口"
                  label: "检查暂停窗口"
                  discoverability: "subtle"
                  depth: 2
                  effects:
                    - set:
                        clues.wipe_pause_window: true
                  unlocks_choices:
                    - "choice_delay_wipe"
                  opens_fragment:
                    id: "frag_pause_window"
                    title: "检查暂停窗口"
                    body: "你可以让清除队列延迟六分钟，但系统会记录这次入侵。"
                    evidence_tags:
                      - "timer"
                    nested_anchors:
          - id: "obs_time_0213"
            text_range: "02:13"
            label: "查看锁屏时间"
            discoverability: "subtle"
            depth: 1
            effects:
              - set:
                  clues.lock_time_0213: true
            unlocks_choices:

            opens_fragment:
              id: "frag_time_0213"
              title: "查看锁屏时间"
              body: "02:13 同时出现在短信草稿、定位日志和锁屏时间里。林像是故意把这个时间留给你。"
              evidence_tags:
                - "pattern"
              nested_anchors:
    choices:
      - id: "choice_call_chen"
        label: "联系陈警官"
        description: "你会把目前情况告诉他，但短信正在警告你不要相信“陈”。"
        requirements:

        effects:
          - add:
              relationships.chen.trust: 1
        next_scene: "ch01_cloud_console"
        irreversible: true
        consequence_level: "chapter"
        outcome: "陈接得很快。他听完后只问了一句：“你看过里面的内容了吗？”"
      - id: "choice_go_station"
        label: "前往废弃地铁站"
        description: "你会离开安全地点，但手机要求先处理远程清除。"
        requirements:
          - state: "clues.station_location"
            equals: true
        effects:
          - add:
              stance.truth_first: 1
        next_scene: "ch01_cloud_console"
        irreversible: true
        consequence_level: "global"
        outcome: "你把手机揣进口袋。导航路线亮起，云端控制台却先弹了出来。"
      - id: "choice_delay_wipe"
        label: "延迟远程清除"
        description: "你会保住手机内容，也会留下入侵记录。"
        requirements:
          - state: "clues.wipe_pause_window"
            equals: true
        effects:
          - add:
              pressure.company_alert: 1
        next_scene: "ch01_cloud_console"
        irreversible: true
        consequence_level: "global"
        outcome: "倒计时跳回 12:00。屏幕角落多了一个你没见过的远程会话图标。"
      - id: "choice_confront_chen"
        label: "带着截断记录质问陈"
        description: "你掌握了他改动定位的痕迹，但摊牌会让他知道你已经查到这里。"
        requirements:
          - state: "clues.chen_trimmed_location"
            equals: true
        effects:
          - add:
              relationships.chen.suspicion: 2
          - add:
              pressure.company_alert: 1
        next_scene: "ch01_contact_trace"
        irreversible: true
        consequence_level: "global"
        outcome: "陈沉默了三秒：“你不该看到那四秒。”"
  - id: "ch01_cloud_console"
    chapter: "第一章：锁屏上的半句话"
    title: "云端控制台"
    task: "阻止手机在路上被清空。"
    pressure: "远程会话在线"
    required_for_demo: true
    state_echoes:
      - id: "echo_cloud_chen_call"
        label: "陈的余音"
        text: "刚才那通电话还挂在后台记录里。陈没有催你交出手机，只是反复确认你是否还安全。"
        requirements:
          - state: "relationships.chen.trust"
            min: 1
    background_blocks:
      - id: "bg_ch01_cloud_console"
        text: "云端控制台自动展开。设备管理后台列出三台设备，临时令牌只剩一次使用机会，右上角的屏幕录制仍在跳秒。"
        observe_anchors:
          - id: "obs_device_admin"
            text_range: "设备管理后台"
            label: "核对后台来源"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.cloud_admin: true
            unlocks_choices:
              - "choice_isolate_phone"
            opens_fragment:
              id: "frag_device_admin"
              title: "核对后台来源"
              body: "后台证书属于林调查过的公司。三台设备最近一次登录都不在公司内网，其中一台落在陈警官所在辖区的公共终端。"
              evidence_tags:
                - "company"
                - "chen"
              nested_anchors:
                - id: "obs_three_devices"
                  text_range: "三台设备"
                  label: "查看设备列表"
                  discoverability: "subtle"
                  depth: 2
                  effects:
                    - add:
                        pressure.company_alert: 1
                  unlocks_choices:
                    - "choice_isolate_phone"
                  opens_fragment:
                    id: "frag_three_devices"
                    title: "查看设备列表"
                    body: "三台设备里只有林的手机仍在移动，另外两台设备像是在给它打掩护。"
                    evidence_tags:
                      - "device"
                    nested_anchors:
          - id: "obs_session_token"
            text_range: "临时令牌"
            label: "复制临时令牌"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.freeze_token: true
            unlocks_choices:
              - "choice_freeze_wipe"
            opens_fragment:
              id: "frag_session_token"
              title: "复制临时令牌"
              body: "令牌可以冻结清除队列，但会把你的设备指纹写入后台日志。"
              evidence_tags:
                - "timer"
                - "risk"
              nested_anchors:
          - id: "obs_screen_recording"
            text_range: "屏幕录制"
            label: "检查录制来源"
            discoverability: "subtle"
            depth: 1
            effects:
              - set:
                  clues.screen_recording: true
            unlocks_choices:
              - "choice_blind_recording"
            opens_fragment:
              id: "frag_screen_recording"
              title: "检查录制来源"
              body: "录制窗口没有麦克风权限，只能看见你点了什么，看不见你听见了什么。"
              evidence_tags:
                - "surveillance"
              nested_anchors:
    choices:
      - id: "choice_freeze_wipe"
        label: "冻结清除队列"
        description: "手机内容会暂时安全，但你的指纹会进入公司日志。"
        requirements:
          - state: "clues.freeze_token"
            equals: true
        effects:
          - add:
              pressure.company_alert: 1
        next_scene: "ch01_contact_trace"
        irreversible: true
        consequence_level: "global"
        outcome: "清除队列变成灰色，倒计时旁多了一条新日志：外部令牌介入。"
      - id: "choice_isolate_phone"
        label: "隔离林的手机"
        description: "你会切断其他设备掩护，换来一条更干净的追踪路径。"
        requirements:
          - state: "clues.cloud_admin"
            equals: true
        effects:
          - set:
              clues.station_route_confirmed: true
        next_scene: "ch01_contact_trace"
        irreversible: true
        consequence_level: "chapter"
        outcome: "另外两台设备掉线，林的手机位置被单独标出。"
      - id: "choice_blind_recording"
        label: "遮断屏幕录制"
        description: "你能隐藏接下来的操作，但会让对方知道你发现了监视。"
        requirements:
          - state: "clues.screen_recording"
            equals: true
        effects:
          - add:
              pressure.company_alert: 1
        next_scene: "ch01_contact_trace"
        irreversible: true
        consequence_level: "chapter"
        outcome: "录制窗口黑了两秒，又重新亮起。对面一定注意到了。"
      - id: "choice_leave_unfrozen"
        label: "带着倒计时继续查"
        description: "你不改动后台，换取对方暂时不知道你介入。"
        requirements:

        effects:
          - add:
              stance.protect_person: 1
        next_scene: "ch01_contact_trace"
        irreversible: true
        consequence_level: "chapter"
        outcome: "倒计时还在跳。你把手机调成离线，只留下本地日志。"
  - id: "ch01_contact_trace"
    chapter: "第一章：锁屏上的半句话"
    title: "联系人里的陈"
    task: "确认陈到底是人名、备注，还是陷阱。"
    pressure: "倒计时稳定"
    required_for_demo: true
    state_echoes:
      - id: "echo_contact_chen_trust"
        label: "陈没有挂断"
        text: "陈的号码仍停在最近通话第一位。他没有继续追问，像是在给你留下自己判断的空间。"
        requirements:
          - state: "relationships.chen.trust"
            min: 1
      - id: "echo_contact_chen_suspicion"
        label: "陈开始收紧"
        text: "你质问过那四秒以后，陈的头像旁多了一个未读提示，却没有新消息。他知道你已经越过了安全线。"
        requirements:
          - state: "relationships.chen.suspicion"
            min: 2
    background_blocks:
      - id: "bg_ch01_contact_trace"
        text: "联系人陈被置顶在最近通话里。共享案件夹的权限还没关闭，一条出租车订单把林送向城北，语音便签停在未播放状态。"
        observe_anchors:
          - id: "obs_chen_alias"
            text_range: "联系人陈"
            label: "核对联系人备注"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.chen_alias: true
            unlocks_choices:

            opens_fragment:
              id: "frag_chen_alias"
              title: "核对联系人备注"
              body: "备注里的陈不只有陈警官，还关联了一个匿名报案人。林把两个号码故意合并在同一张联系人卡里，并把共享案件夹挂在联系人详情下。"
              evidence_tags:
                - "chen"
                - "alias"
              nested_anchors:
                - id: "obs_casefile_share"
                  text_range: "共享案件夹"
                  label: "打开共享案件夹"
                  discoverability: "subtle"
                  depth: 2
                  effects:
                    - set:
                        clues.chen_casefile: true
                  unlocks_choices:
                    - "choice_warn_chen"
                  opens_fragment:
                    id: "frag_casefile_share"
                    title: "打开共享案件夹"
                    body: "案件夹里有陈警官写给林的草稿：如果录音公开，先保人，再保案子。"
                    evidence_tags:
                      - "relationship"
                      - "casefile"
                    nested_anchors:
          - id: "obs_taxi_order"
            text_range: "出租车订单"
            label: "查看订单路线"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.station_route_confirmed: true
            unlocks_choices:
              - "choice_leave_for_station"
            opens_fragment:
              id: "frag_taxi_order"
              title: "查看订单路线"
              body: "订单终点不是地铁站正门，而是废弃站旁的旧员工入口。"
              evidence_tags:
                - "location"
              nested_anchors:
          - id: "obs_voice_note"
            text_range: "语音便签"
            label: "播放语音便签"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.voice_note: true
              - add:
                  relationships.lin.bond: 1
            unlocks_choices:
              - "choice_send_voice_to_self"
            opens_fragment:
              id: "frag_voice_note"
              title: "播放语音便签"
              body: "林的声音很低：别让他们把我变成唯一的坏人。你第一次听见她像是在向你求证，而不是求救。"
              evidence_tags:
                - "lin"
                - "bond"
              nested_anchors:
    choices:
      - id: "choice_leave_for_station"
        label: "沿订单路线去旧员工入口"
        description: "路线更隐蔽，但会直接进入林最后出现的区域。"
        requirements:
          - state: "clues.station_route_confirmed"
            equals: true
        effects:
          - add:
              stance.truth_first: 1
        next_scene: "ch02_station_gate"
        irreversible: true
        consequence_level: "global"
        outcome: "你按下确认。第一章的线索收束成一个地点：城北废弃站。"
      - id: "choice_send_voice_to_self"
        label: "备份语音便签"
        description: "你会保留林的原声，也承担保管她软弱证据的责任。"
        requirements:
          - state: "clues.voice_note"
            equals: true
        effects:
          - add:
              relationships.lin.bond: 1
        next_scene: "ch02_station_gate"
        irreversible: true
        consequence_level: "global"
        outcome: "便签被复制到离线区。林的声音从案件线索变成了一个你必须面对的人。"
      - id: "choice_warn_chen"
        label: "把共享草稿截图发给陈"
        description: "他会知道你看见了他的犹豫，也可能因此帮你。"
        requirements:
          - state: "clues.chen_casefile"
            equals: true
        effects:
          - add:
              relationships.chen.trust: 1
        next_scene: "ch02_station_gate"
        irreversible: true
        consequence_level: "chapter"
        outcome: "陈回了一个定位点，没有解释，也没有否认。"
      - id: "choice_follow_old_address"
        label: "不通知任何人直接出发"
        description: "你会少暴露一点，但也少一个外部支点。"
        requirements:

        effects:
          - add:
              stance.protect_person: 1
        next_scene: "ch02_station_gate"
        irreversible: true
        consequence_level: "chapter"
        outcome: "你锁上屏幕，出租车订单的终点在黑暗里闪了一下。"
  - id: "ch02_station_gate"
    chapter: "第二章：废弃地铁站"
    title: "旧员工入口"
    task: "找到进入废弃站台的低风险路线。"
    pressure: "站外监控稀疏"
    required_for_demo: true
    state_echoes:
      - id: "echo_gate_chen_trust"
        label: "陈给过定位"
        text: "如果你选择过相信陈，他发来的定位点会和旧员工入口重合。这不是洗白，只是说明他至少没把你引向正门。"
        requirements:
          - state: "relationships.chen.trust"
            min: 1
      - id: "echo_gate_chen_suspicion"
        label: "被陈看见的路线"
        text: "质问陈之后再来到这里，入口反而显得过于安静。你很难判断这是他的帮助，还是他的布置。"
        requirements:
          - state: "relationships.chen.suspicion"
            min: 2
      - id: "echo_gate_lin_bond"
        label: "林的声音同行"
        text: "你备份过语音便签后，林的那句“别只救我”会在入口前再次响起，让这里不再只是一个坐标。"
        requirements:
          - state: "relationships.lin.bond"
            min: 2
    background_blocks:
      - id: "bg_ch02_station_gate"
        text: "旧员工入口被铁链绕住，检修门旁贴着褪色编号。保安亭里还亮着一盏台灯，墙角摄像头盲区刚好覆盖半扇门。"
        observe_anchors:
          - id: "obs_station_entry_code"
            text_range: "检修门"
            label: "查看检修门编号"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.station_entry_code: true
            unlocks_choices:
              - "choice_enter_service_corridor"
            opens_fragment:
              id: "frag_station_entry_code"
              title: "查看检修门编号"
              body: "编号末尾是 0213。林把时间、订单和入口码叠在了一起。"
              evidence_tags:
                - "pattern"
                - "entry"
              nested_anchors:
          - id: "obs_security_booth"
            text_range: "保安亭"
            label: "检查保安亭"
            discoverability: "obvious"
            depth: 1
            effects:
              - set:
                  clues.security_booth: true
